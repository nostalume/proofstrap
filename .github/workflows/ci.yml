name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download modules
        run: go mod download

      - name: Check formatting
        run: |
          unformatted="$(gofmt -l cmd internal)"
          test -z "$unformatted" || {
            printf 'Unformatted files:\n%s\n' "$unformatted"
            exit 1
          }

      - name: Vet
        run: go vet ./...

      - name: Check exhaustive sum types
        run: go tool go-check-sumtype ./...

      - name: Test
        run: go test -count=1 ./...

      - name: Test race detector
        run: go test -race -count=1 ./...

      - name: Build
        run: go build -o "$RUNNER_TEMP/proofstrap" ./cmd/proofstrap